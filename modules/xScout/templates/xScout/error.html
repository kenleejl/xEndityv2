{% extends 'base.html' %}

{% block title %}Error{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Breadcrumb Navigation -->
    <nav class="flex items-center space-x-2 text-sm mb-6">
        <a href="{% url 'xscout:index' %}" class="text-green-600 dark:text-green-400 hover:text-green-800 dark:hover:text-green-300 font-medium">
            xScout
        </a>
        <i class="fas fa-chevron-right text-gray-400 text-xs"></i>
        <span class="text-gray-600 dark:text-gray-400">Error</span>
    </nav>
    
    <!-- Page Header -->
    <div class="mb-8">
        <div class="flex items-center space-x-3">
            <div class="p-3 bg-gradient-to-r from-red-500 to-red-600 rounded-2xl shadow-lg">
                <i class="fas fa-exclamation-triangle text-white text-2xl"></i>
            </div>
            <div>
                <h1 class="text-4xl font-bold text-gray-900 dark:text-white">Error</h1>
            </div>
        </div>
    </div>

    <!-- Error Card -->
    <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl rounded-2xl shadow-xl border border-gray-200/50 dark:border-gray-700/50 overflow-hidden">
        <div class="bg-gradient-to-r from-red-500 to-red-600 p-6">
            <div class="flex items-center space-x-3">
                <i class="fas fa-times-circle text-white text-xl"></i>
                <h2 class="text-xl font-bold text-white">An Error Occurred</h2>
            </div>
        </div>
        
        <div class="p-8">
            <div class="text-center mb-8">
                <div class="mx-auto h-24 w-24 bg-red-100 dark:bg-red-900 rounded-full flex items-center justify-center mb-6">
                    <i class="fas fa-exclamation-triangle text-red-600 dark:text-red-300 text-3xl"></i>
                </div>
                <h3 class="text-xl font-semibold text-gray-900 dark:text-white mb-4">Something went wrong</h3>
                <div class="bg-red-50 dark:bg-red-900/50 border border-red-200 dark:border-red-800 rounded-xl p-4 mb-6">
                    <p class="text-red-800 dark:text-red-200">{{ error }}</p>
                </div>
            </div>
            
            <div class="flex justify-center space-x-4">
                <a href="{% url 'xscout:analyze' %}" 
                   class="inline-flex items-center space-x-2 bg-gradient-to-r from-green-500 to-emerald-600 text-white font-semibold px-6 py-3 rounded-xl hover:from-green-600 hover:to-emerald-700 transition-all duration-200 shadow-lg hover:shadow-xl">
                    <i class="fas fa-arrow-left"></i>
                    <span>Return to Analysis</span>
                </a>
                <a href="{% url 'xscout:index' %}" 
                   class="inline-flex items-center space-x-2 bg-gradient-to-r from-blue-500 to-blue-600 text-white font-semibold px-6 py-3 rounded-xl hover:from-blue-600 hover:to-blue-700 transition-all duration-200 shadow-lg hover:shadow-xl">
                    <i class="fas fa-home"></i>
                    <span>Go to Dashboard</span>
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
